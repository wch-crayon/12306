<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MC铁路12306</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo">
            🚆 MC铁路12306
            <span>幻市铁路集团 · 猪市铁路局 · 天海铁路集团 · 望京铁路局 · 齐河铁路集团</span>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-bar-content">
        <button class="nav-btn-white active" data-page="home">🏠 首页</button>
        <button class="nav-btn-white" data-page="station">🚉 车站查询</button>
        <button class="nav-btn-white" data-page="train">🚆 车次查询</button>
        <button class="nav-btn-white" data-page="about">🏢 路局简介</button>
    </div>
</div>

<div class="main-container">
    <!-- 首页 -->
    <div id="homePage" class="page active-page">
        <div class="card">
            <div class="card-title">📅 车票预订</div>
            <div class="query-form">
                <div class="form-group" id="fromStationGroup">
                    <label>🚉 出发站 / 城市</label>
                    <div id="fromStationWrapper" class="custom-select-wrapper"></div>
                    <select id="fromStation" style="display:none;"></select>
                </div>
                <div class="form-group" id="toStationGroup">
                    <label>📍 到达站 / 城市</label>
                    <div id="toStationWrapper" class="custom-select-wrapper"></div>
                    <select id="toStation" style="display:none;"></select>
                </div>
                <div class="form-group">
                    <label>📆 出发日期</label>
                    <input type="date" id="travelDate" value="">
                </div>
                <button class="search-btn" id="searchTrainsBtn">🔍 查询车次</button>
            </div>
            <div id="trainResultArea">
                <div style="text-align:center; padding:40px; color:#8a9bb0;">⭐ 请选择始发站/城市和到达站/城市，点击查询</div>
            </div>
        </div>
    </div>

    <!-- 车站查询页 -->
    <div id="stationPage" class="page">
        <div class="card">
            <div class="card-title">🚉 车站查询</div>
            <div style="margin-bottom: 20px;">
                <input type="text" id="stationSearchInput" placeholder="🔍 输入站名或城市名搜索" style="width:100%; padding:12px 15px; border-radius:40px; border:1px solid #cbd5e1;">
            </div>
            <div class="station-grid" id="stationList"></div>
            <div style="margin-top: 20px; padding: 16px; background: #f8fafd; border-radius: 16px;">
                <div style="font-weight: 600; margin-bottom: 8px;">📌 查询提示</div>
                <div style="font-size: 0.85rem; color: #5b6e8c;">点击上方车站标签可快速填入出发站。输入城市名可查看该城市所有车站</div>
            </div>
        </div>
    </div>

    <!-- 车次查询页 -->
    <div id="trainPage" class="page">
        <div class="card">
            <div class="card-title">🚆 车次查询</div>
            <div class="inline-form">
                <div class="form-group">
                    <label>车次号 (如 G1, D5033)</label>
                    <input type="text" id="trainNoInput" placeholder="请输入车次号" autocomplete="off">
                </div>
                <button class="search-btn" id="searchByTrainNoBtn">🔍 查询车次</button>
            </div>
            <div id="trainByNoResult"></div>
        </div>
    </div>

    <!-- 路局简介页（空容器，内容从 railways.html 加载） -->
    <div id="aboutPage" class="page"></div>
</div>

<script src="script.js"></script>
</body>
</html>
